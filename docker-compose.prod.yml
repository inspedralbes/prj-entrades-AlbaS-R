  #   depends_on:
  #     - front
  #     - api
  #     - websockets

  nginx:
    image: jonasal/nginx-certbot:latest
    container_name: star_movie_nginx
    restart: unless-stopped
    env_file:
      - ./nginx/certbot.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_secrets:/etc/letsencrypt
      - ./nginx/default.conf:/etc/nginx/user_conf.d/default.conf
      - ./back/api:/var/www/api
      - ./back/api/public:/var/www/public:ro
    depends_on:
      - front
      - api
      - websockets

  db:
    image: mysql:8.0
    container_name: star_movie_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: StarMovie
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-star_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: star_movie_redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: star_movie_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: star_movie_front
    restart: unless-stopped
    env_file:
      - ./front/.env
    environment:
      - NODE_ENV=production

  api:
    build:
      context: ./back/api
      dockerfile: Dockerfile.prod
    container_name: star_movie_api
    restart: unless-stopped
    env_file:
      - ./back/api/.env
    volumes:
      - ./back/api/storage:/var/www/storage
    depends_on:
      - db
      - redis
      - rabbitmq

  websockets:
    build:
      context: ./back/websockets
      dockerfile: Dockerfile
    container_name: star_movie_websockets
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - redis

volumes:
  mysql_data:
  nginx_secrets:
